<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>창작마당 — 한시나루</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+Mono+TC&family=Liu+Jian+Mao+Cao&family=Long+Cang&family=Ma+Shan+Zheng&family=Noto+Serif+KR:wght@400;600;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/dje5vco.css">
  <link rel="stylesheet" href="/shared/styles.css">
  <link rel="stylesheet" href="/shared/board.css">
  <link rel="stylesheet" href="/community/community-layout.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="layout-comm">
    <aside class="comm-sidebar">
      <ul class="comm-menu">
        <li><a href="/community/notice/" class="comm-menu-link">공지사항</a></li>
        <li><a href="/community/forum/" class="comm-menu-link">자유게시판</a></li>
        <li><a href="/community/news/" class="comm-menu-link">뉴스</a></li>
        <li><a href="/community/qna/" class="comm-menu-link">묻고 답하기</a></li>
        <li><a href="/community/showcase/" class="comm-menu-link">창작마당</a></li>
      </ul>
    </aside>

    <main class="comm-content">
      <section class="board-body">
        <div id="boardContainer"></div>
      </section>
    </main>
  </div>

  <div id="footer-placeholder"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="/shared/supabase.js"></script>
  <script src="/shared/auth-state.js"></script>
  <script src="/shared/board.js"></script>
  <script src="/shared/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      Board.init({
        board: 'showcase',
        containerId: 'boardContainer',
        pageSize: 6,
        canWrite: function (user) { return !!user; }
      });
    });
  </script>
  <script>
    // 사이드바 현재 페이지 active
    document.querySelectorAll('.comm-menu-link').forEach(function(link) {
      if (link.getAttribute('href') === location.pathname) link.classList.add('active');
    });
  </script>
</body>
</html>
