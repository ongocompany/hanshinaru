<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 — 한시나루</title>

  <!-- Fonts -->
  <link rel="stylesheet" href="https://use.typekit.net/dje5vco.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+Mono+TC&family=Noto+Serif+KR:wght@200..900&family=Noto+Serif+TC:wght@200..900&display=swap" rel="stylesheet">

  <!-- Shared Styles -->
  <link rel="stylesheet" href="/shared/styles.css">
  <link rel="stylesheet" href="/community/community-layout.css">

  <style>
    /* ===== 메인 페이지 고유 스타일 ===== */
    .comm-inner {
      padding: 40px 32px 80px;
    }
    .layout-comm .comm-sidebar .comm-menu {
      padding-top: 40px;
    }

    /* ===== 2컬럼 그리드 ===== */
    .comm-grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ===== 패널 (각 섹션 박스) ===== */
    .comm-panel {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      min-height: 380px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      scroll-margin-top: 100px;
    }

    .comm-panel-full {
      min-height: 380px;
    }

    .comm-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 24px 11px;
      background: #f5f7f8;
      border-bottom: 1px solid #eef2f3;
    }

    .comm-panel-header h3 {
      font-family: var(--font-ko);
      font-size: 18px;
      font-weight: bold;
      color: #1C2122;
      margin: 0;
    }

    .comm-header-links {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .comm-write-link {
      font-family: var(--font-ko);
      font-size: 13px;
      color: #6e8387;
      text-decoration: none;
      transition: color 0.2s;
    }

    .comm-write-link:hover {
      color: #1C2122;
    }

    .comm-link-sep {
      color: #d0d8da;
      font-size: 12px;
    }

    .comm-more-link {
      font-family: var(--font-ko);
      font-size: 13px;
      color: var(--c-powder-blue, #a4b8c4);
      text-decoration: none;
      transition: color 0.2s;
    }

    .comm-more-link:hover {
      color: #6e8387;
    }

    /* 미리보기 영역 */
    .comm-preview-area {
      flex: 1;
      padding: 0;
    }

    /* 미리보기 테이블 */
    .preview-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .preview-table tr {
      border-bottom: 1px solid #f0f2f3;
      cursor: pointer;
      transition: background 0.15s;
    }

    .preview-table tr:hover {
      background: #f8fafb;
    }

    .preview-table tr:last-child {
      border-bottom: none;
    }

    .preview-table td {
      padding: 10px 12px;
      font-family: var(--font-ko);
      font-size: 14px;
      color: #3a4a50;
      vertical-align: middle;
    }

    .preview-table td:first-child {
      padding-left: 24px;
    }

    .preview-table td:last-child {
      padding-right: 24px;
    }

    .preview-td-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 0;
      width: 100%;
    }

    .preview-comment-count {
      font-size: 11px;
      color: #e04040;
      margin-left: 4px;
    }

    .preview-td-stats {
      color: var(--c-powder-blue, #a4b8c4);
      font-size: 12px;
      white-space: nowrap;
      width: 60px;
      text-align: right;
    }

    /* 로딩/빈 상태 */
    .comm-loading,
    .comm-placeholder-msg,
    .comm-empty-msg {
      padding: 40px 24px;
      text-align: center;
      font-family: var(--font-ko);
      font-size: 14px;
      color: var(--c-powder-blue, #a4b8c4);
    }

    .comm-placeholder-msg {
      color: #bbb;
      font-style: italic;
    }

    /* 광고 플레이스홀더 */
    .comm-ad-slot {
      margin-top: auto;
      padding: 24px;
      text-align: center;
      font-family: var(--font-ko);
      font-size: 13px;
      color: #bbb;
      background: #f5f7f8;
      border-top: 1px dashed #e0e5e7;
    }

    .comm-ad-banner {
      margin: 24px 0;
      padding: 32px;
      text-align: center;
      font-family: var(--font-ko);
      font-size: 14px;
      color: #bbb;
      background: #f5f7f8;
      border-radius: 8px;
      border: 1px dashed #e0e5e7;
    }

    /* 구분선 */
    .comm-divider {
      border: none;
      border-top: 1px solid var(--c-silver, #c8d3d5);
      margin: 32px 0;
    }

    /* ===== 창작마당 카드 그리드 ===== */
    .comm-showcase-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 16px 24px 24px !important;
    }

    .showcase-card {
      background: linear-gradient(135deg, #fafbfc, #f0f4f5);
      border-radius: 10px;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #e8eef0;
    }

    .showcase-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    .showcase-card-title {
      font-family: var(--font-zh, 'LXGW WenKai Mono TC');
      font-size: 18px;
      color: #1C2122;
      margin-bottom: 8px;
      line-height: 1.5;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .showcase-card-author {
      font-family: var(--font-ko);
      font-size: 13px;
      color: #6a7a80;
      margin-bottom: 8px;
    }

    .showcase-card-likes {
      font-family: var(--font-ko);
      font-size: 12px;
      color: var(--c-powder-blue, #a4b8c4);
    }

    /* ===== Responsive (메인 페이지 고유) ===== */
    @media (max-width: 768px) {
      .comm-inner {
        padding: 24px 16px 48px;
      }
      .comm-grid-2col {
        grid-template-columns: 1fr;
      }
      .comm-showcase-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
      .comm-panel-header {
        padding: 16px 16px 12px;
      }
      .preview-table td:first-child {
        padding-left: 16px;
      }
      .preview-table td:last-child {
        padding-right: 16px;
      }
      .preview-td-stats {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="layout-comm">
    <!-- 사이드바 -->
    <aside class="comm-sidebar">
      <ul class="comm-menu">
        <li><a href="/community/notice/" class="comm-menu-link">공지사항</a></li>
        <li><a href="/community/forum/" class="comm-menu-link">자유게시판</a></li>
        <li><a href="/community/news/" class="comm-menu-link">뉴스</a></li>
        <li><a href="/community/qna/" class="comm-menu-link">묻고 답하기</a></li>
        <li><a href="/community/showcase/" class="comm-menu-link">창작마당</a></li>
      </ul>
    </aside>

    <!-- 콘텐츠 영역 -->
    <main class="comm-content">
      <div class="comm-inner">

        <!-- 상단 2컬럼 그리드 -->
        <div class="comm-grid-2col">
          <section id="section-notice" class="comm-panel">
            <div class="comm-panel-header">
              <h3>공지사항</h3>
              <a href="/community/notice/" class="comm-more-link">더보기 →</a>
            </div>
            <div id="preview-notice" class="comm-preview-area">
              <div class="comm-loading">불러오는 중...</div>
            </div>
            <div class="comm-ad-slot">광고 영역</div>
          </section>

          <section id="section-forum" class="comm-panel">
            <div class="comm-panel-header">
              <h3>자유게시판</h3>
              <span class="comm-header-links">
                <a href="/community/forum/?write=1" class="comm-write-link">새글쓰기 +</a>
                <span class="comm-link-sep">|</span>
                <a href="/community/forum/" class="comm-more-link">더보기 →</a>
              </span>
            </div>
            <div id="preview-forum" class="comm-preview-area">
              <div class="comm-loading">불러오는 중...</div>
            </div>
          </section>
        </div>

        <hr class="comm-divider">

        <!-- 하단 2컬럼 그리드 -->
        <div class="comm-grid-2col">
          <section id="section-news" class="comm-panel">
            <div class="comm-panel-header">
              <h3>뉴스</h3>
              <a href="/community/news/" class="comm-more-link">더보기 →</a>
            </div>
            <div id="preview-news" class="comm-preview-area">
              <div class="comm-loading">불러오는 중...</div>
            </div>
          </section>

          <section id="section-qna" class="comm-panel">
            <div class="comm-panel-header">
              <h3>묻고 답하기</h3>
              <span class="comm-header-links">
                <a href="/community/qna/?write=1" class="comm-write-link">새글쓰기 +</a>
                <span class="comm-link-sep">|</span>
                <a href="/community/qna/" class="comm-more-link">더보기 →</a>
              </span>
            </div>
            <div id="preview-qna" class="comm-preview-area">
              <div class="comm-loading">불러오는 중...</div>
            </div>
          </section>
        </div>

        <!-- 중간 광고 배너 -->
        <div class="comm-ad-banner">광고 영역</div>

        <hr class="comm-divider">

        <!-- 창작마당 (1컬럼 전체폭) -->
        <section id="section-showcase" class="comm-panel comm-panel-full">
          <div class="comm-panel-header">
            <h3>창작마당</h3>
            <a href="/community/showcase/" class="comm-more-link">더보기 →</a>
          </div>
          <div id="preview-showcase" class="comm-preview-area comm-showcase-grid">
            <div class="comm-loading">불러오는 중...</div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/shared/supabase.js"></script>
  <script src="/shared/auth-state.js"></script>
  <script src="/shared/components.js"></script>
  <script src="community.js"></script>
</body>
</html>
