<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뉴스 — 한시나루</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/dje5vco.css">
  <link rel="stylesheet" href="/shared/styles.css">
  <link rel="stylesheet" href="/community/community-layout.css">
  <style>
    .news-body {
      padding: 32px;
    }
    .news-intro {
      margin-bottom: 16px;
    }
    .news-intro h2 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #2a3639;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .news-intro p {
      margin: 0;
      font-size: 14px;
      line-height: 1.7;
      color: #5f7378;
    }
    .comm-menu-link {
      transition: transform 0.4s ease;
      background: transparent;
      color: #000;
    }
    .comm-menu-link:hover {
      transform: scale(1.08);
      background: transparent;
      color: #000;
    }
    .comm-menu-link.active {
      font-weight: bold;
      background: transparent;
      color: #000;
    }
    .news-list { list-style: none; display: grid; gap: 14px; }
    .news-item {
      padding: 0;
      border: 1px solid #e7ecee;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      margin-bottom: 5px;
    }
    .news-toggle {
      width: 100%;
      border: 0;
      background: #fff;
      text-align: left;
      padding: 14px 16px 12px;
      cursor: pointer;
    }
    .news-toggle:hover {
      background: #f8fbfc;
    }
    .news-title {
      font-size: 17px;
      color: #2a3639;
      margin-bottom: 8px;
      line-height: 1.45;
      font-weight: 700;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .news-meta {
      font-size: 12px;
      color: #77878c;
      margin-bottom: 0;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .news-type-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-size: 11px;
    }
    .news-type-badge.news {
      color: #52717c;
      background: #edf6fa;
      border-color: #cfe1e8;
    }
    .news-type-badge.info {
      color: #2f6b4f;
      background: #edf8f1;
      border-color: #cce8d7;
    }
    .news-type-badge.column {
      color: #7b5c20;
      background: #fff5df;
      border-color: #efd7a5;
    }
    .news-ai-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #bad7e5;
      font-size: 11px;
      color: #1f4e63;
      background: #e8f5fb;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .news-accordion {
      border-top: 1px solid #edf2f4;
      padding: 12px 16px 14px;
      background: #fcfefe;
    }
    .news-content {
      font-size: 14px; color: #475a60; line-height: 1.75;
      white-space: pre-wrap;
    }
    .news-source-link {
      margin-top: 10px;
      display: inline-block;
      color: #6e8387;
      font-size: 12px;
      text-decoration: none;
    }
    .news-source-link.column {
      font-weight: 700;
    }
    .news-source-link:hover {
      text-decoration: underline;
    }
    .news-loading {
      text-align: center; padding: 48px; color: #999;
    }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="layout-comm">
    <aside class="comm-sidebar">
      <ul class="comm-menu">
        <li><a href="/community/notice/" class="comm-menu-link">공지사항</a></li>
        <li><a href="/community/forum/" class="comm-menu-link">자유게시판</a></li>
        <li><a href="/community/news/" class="comm-menu-link">뉴스</a></li>
        <li><a href="/community/qna/" class="comm-menu-link">묻고 답하기</a></li>
        <li><a href="/community/showcase/" class="comm-menu-link">창작마당</a></li>
      </ul>
    </aside>

    <main class="comm-content">
      <section class="news-body">
        <div class="news-intro">
          <h2>새소식</h2>
          <p>한시, 한자, 문화 등 다양한 소식을 전달합니다. 일부 기사는 AI가 작성한 기사입니다.</p>
        </div>
        <div class="news-loading" id="newsLoading">뉴스를 불러오는 중...</div>
        <ul class="news-list" id="newsList" style="display:none;"></ul>
        <div id="newsEmpty" style="display:none; text-align:center; padding:48px; color:#999;">
          <p>등록된 뉴스가 없습니다.</p>
        </div>
      </section>
    </main>
  </div>

  <div id="footer-placeholder"></div>
  <script src="/shared/auth-state.js"></script>
  <script src="/shared/components.js"></script>
  <script>
    // 뉴스 데이터 로드 (news_articles.json이 있으면 표시)
    (async function() {
      const loading = document.getElementById('newsLoading');
      const list = document.getElementById('newsList');
      const empty = document.getElementById('newsEmpty');

      function escapeHTML(str) {
        const d = document.createElement('div');
        d.textContent = str == null ? '' : String(str);
        return d.innerHTML;
      }

      function formatDateTime(v) {
        if (!v) return '-';
        const d = new Date(v);
        if (Number.isNaN(d.getTime())) return escapeHTML(String(v));
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const mi = String(d.getMinutes()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
      }

      try {
        const res = await fetch('/public/index/news_articles.json?_ts=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('no data');
        const payload = await res.json();
        const articles = Array.isArray(payload?.articles) ? payload.articles : (Array.isArray(payload) ? payload : []);
        if (!articles.length) {
          loading.style.display = 'none';
          empty.style.display = 'block';
          return;
        }

        const sorted = articles
          .slice()
          .sort((a, b) => {
            const pubDiff = new Date(b.publishedAt || 0) - new Date(a.publishedAt || 0);
            if (pubDiff !== 0) return pubDiff;
            return new Date(b.crawledAt || b.publishedAt || 0) - new Date(a.crawledAt || a.publishedAt || 0);
          })
          .slice(0, 30);

        list.innerHTML = sorted.map(a => `
          <li class="news-item fade-in">
            <button type="button" class="news-toggle" aria-expanded="false">
              <div class="news-title">${escapeHTML(a.title || '제목 없음')}</div>
              <div class="news-meta">
                <span class="news-type-badge ${a.articleType === 'column' ? 'column' : (a.articleType === 'info' ? 'info' : 'news')}">${a.articleType === 'column' ? '컬럼' : (a.articleType === 'info' ? '정보' : '기사')}</span>
                ${a.aiWritten === true ? '<span class="news-ai-badge">AI작성</span>' : ''}
                <span>작성시간: ${formatDateTime(a.crawledAt || a.publishedAt)}</span>
              </div>
            </button>
            <div class="news-accordion" hidden>
              <div class="news-content">${escapeHTML(a.body || a.summary || '')}</div>
              ${a.sourceUrl ? `<a class="news-source-link ${a.articleType === 'column' ? 'column' : ''}" href="${escapeHTML(a.sourceUrl)}" target="_blank" rel="noopener">원문 보기</a>` : ''}
            </div>
          </li>
        `).join('');
        loading.style.display = 'none';
        list.style.display = 'block';

        const toggles = list.querySelectorAll('.news-toggle');
        toggles.forEach((btn) => {
          btn.addEventListener('click', () => {
            const item = btn.closest('.news-item');
            if (!item) return;
            const panel = item.querySelector('.news-accordion');
            const willOpen = panel ? panel.hidden : false;

            list.querySelectorAll('.news-item').forEach((el) => {
              const p = el.querySelector('.news-accordion');
              const b = el.querySelector('.news-toggle');
              if (!p || !b) return;
              p.hidden = true;
              b.setAttribute('aria-expanded', 'false');
            });

            if (panel) {
              panel.hidden = !willOpen;
              btn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
            }
          });
        });
      } catch (e) {
        loading.style.display = 'none';
        empty.style.display = 'block';
      }
    })();

    // 사이드바 현재 페이지 active
    document.querySelectorAll('.comm-menu-link').forEach(function(link) {
      if (link.getAttribute('href') === location.pathname) link.classList.add('active');
    });
  </script>
</body>
</html>
