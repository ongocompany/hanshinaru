<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한시나루</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <link rel="stylesheet" href="/shared/board.css">
  <link rel="stylesheet" href="/community/community-layout.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="layout-comm">
    <!-- 사이드바 -->
    <aside class="comm-sidebar">
      <ul class="comm-menu">
        <li><a href="/community/notice/" class="comm-menu-link">공지사항</a></li>
        <li><a href="/community/forum/" class="comm-menu-link">자유게시판</a></li>
        <li><a href="/community/news/" class="comm-menu-link">뉴스</a></li>
        <li><a href="/community/qna/" class="comm-menu-link">묻고 답하기</a></li>
        <li><a href="/community/showcase/" class="comm-menu-link">창작마당</a></li>
      </ul>
    </aside>

    <!-- 콘텐츠 -->
    <main class="comm-content">
      <section class="board-body">
        <div id="boardContainer"></div>
      </section>
    </main>
  </div>

  <div id="footer-placeholder"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <script src="/shared/supabase.js"></script>
  <script src="/shared/auth-state.js"></script>
  <script src="/shared/board/core.js"></script>
  <script src="/shared/board/feed.js"></script>
  <script src="/shared/board/showcase.js"></script>
  <script src="/shared/board/write.js"></script>
  <script src="/shared/board/comments.js"></script>
  <script src="/shared/board/ai-bg.js"></script>
  <script src="/shared/board/handlers.js"></script>
  <script src="/shared/board/init.js"></script>
  <script src="/shared/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      Board.init({
        board: 'notice',
        containerId: 'boardContainer',
        pageSize: 10,
        canWrite: function (user) {
          return user && user.role === 'admin';
        }
      });
    });
  </script>
  <script>
    // 사이드바 현재 페이지 active 표시
    document.querySelectorAll('.comm-menu-link').forEach(function(link) {
      if (link.getAttribute('href') === location.pathname) link.classList.add('active');
    });
  </script>
</body>
</html>
