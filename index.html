<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한시나루 — 준비 중</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #fcfafa;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap {
      text-align: center;
      padding: 40px 24px;
      max-width: 520px;
    }
    .brand {
      font-family: 'PingFang SC', 'Microsoft YaHei', serif;
      font-size: 48px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 16px;
    }
    .sub {
      font-size: 18px;
      color: #6e8387;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .notice {
      display: inline-block;
      padding: 12px 28px;
      background: #fff;
      border: 1px solid #c8d3d5;
      border-radius: 10px;
      font-size: 15px;
      color: #333;
      line-height: 1.7;
    }
    .dim { color: #999; font-size: 13px; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">漢詩나루</div>
    <p class="sub">한시의 아름다움을 함께 읽고, 배우고, 나누는 공간</p>
    <div class="notice">
      더 나은 서비스를 위해 사이트를 개편하고 있습니다.<br>
      빠른 시일 내에 새로운 모습으로 찾아뵙겠습니다.
    </div>
    <p class="dim">hanshinaru.kr</p>
  </div>
</body>
</html>
