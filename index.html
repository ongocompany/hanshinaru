<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>당시삼백수 타임라인</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- 지도: Leaflet (출생지 표시용) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- 관계도: vis-network (시인 교유 관계 표시용) -->
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>

<header class="site-header">
  <h1>당시삼백수</h1>
  <p>시간축 위에서 시와 역사를 나란히 읽다</p>
</header>

<main class="timeline" id="timeline"></main>

<!-- 공용 모달(시인/작품/사건 모두 이 틀을 사용) -->
<div id="modal-overlay" class="modal-overlay" hidden>
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close" aria-label="닫기">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="app.js"></script>

<footer class="site-footer">
  <p>자료 출처: 동양고전종합DB · 비상업적 연구용</p>
</footer>

</body>
</html>
