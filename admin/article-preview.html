<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미리보기 — 한시나루</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-ko: system-ui, -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      --font-zh: 'Noto Serif CJK SC', 'Noto Serif SC', 'Source Han Serif SC', serif;
      --fs-h1: 36px;
      --fs-h2: 28px;
      --fs-h3: 22px;
      --fs-body: 17px;
      --fs-small: 15px;
      --fs-xs: 14px;
      --c-bright-snow: #fcfafa;
      --c-silver: #c8d3d5;
      --c-powder-blue: #a4b8c4;
      --c-ink: #000;
      --c-muted: #333;
      --c-faint: #999;
      --c-border: var(--c-silver);
      --nav-height: 52px;
      --content-max: 960px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-ko);
      background: #fff;
      color: var(--c-ink);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }

    .zh { font-family: var(--font-zh); }

    /* Preview banner */
    .preview-banner {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fef3c7;
      border-bottom: 1px solid #fbbf24;
      padding: 8px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: #92400e;
    }
    .preview-banner button {
      background: #92400e;
      color: #fff;
      border: none;
      padding: 4px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    /* Content area — matches article template */
    .content {
      max-width: var(--content-max);
      margin: 0 auto;
      padding: 32px 40px;
    }

    .article-cover {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 24px;
    }

    .article-title {
      font-size: var(--fs-h1);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .article-subtitle {
      color: var(--c-faint);
      font-size: var(--fs-small);
      margin-bottom: 32px;
    }

    .article-body {
      line-height: 1.9;
      color: var(--c-muted);
      font-size: var(--fs-body);
    }

    .article-body h2 {
      font-size: var(--fs-h2);
      color: var(--c-ink);
      margin: 40px 0 12px;
    }

    .article-body h3 {
      font-size: var(--fs-h3);
      color: var(--c-ink);
      margin: 32px 0 8px;
    }

    .article-body p {
      margin-bottom: 16px;
    }

    .article-body img {
      max-width: 100%;
      border-radius: 8px;
      margin: 16px 0;
    }

    .article-body iframe {
      max-width: 100%;
      border-radius: 8px;
      margin: 16px 0;
    }

    .article-body blockquote {
      border-left: 3px solid var(--c-powder-blue);
      padding: 8px 20px;
      margin: 16px 0;
      color: var(--c-faint);
      background: var(--c-bright-snow);
      border-radius: 0 8px 8px 0;
    }

    .article-body ul, .article-body ol {
      margin: 12px 0;
      padding-left: 24px;
    }

    .article-body li {
      margin-bottom: 4px;
    }

    .article-body a {
      color: #2563eb;
      text-decoration: underline;
    }

    .article-body pre {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 14px;
      margin: 16px 0;
    }

    .empty {
      text-align: center;
      color: var(--c-faint);
      padding: 80px 20px;
      font-size: 15px;
    }

    @media (max-width: 768px) {
      .content { padding: 24px 16px; }
      .article-title { font-size: 28px; }
    }
  </style>
</head>
<body>

<div class="preview-banner">
  <span>미리보기 모드 — 실제 발행된 모습과 동일합니다</span>
  <button onclick="window.close()">닫기</button>
</div>

<div class="content" id="content">
  <div class="empty">미리보기 데이터가 없습니다. 에디터에서 미리보기 버튼을 눌러주세요.</div>
</div>

<script>
(function () {
  const raw = sessionStorage.getItem('article-preview');
  if (!raw) return;

  try {
    const data = JSON.parse(raw);
    const el = document.getElementById('content');
    let html = '';

    if (data.cover_image) {
      html += `<img src="${data.cover_image}" alt="${data.title}" class="article-cover">`;
    }

    html += `<h1 class="article-title">${data.title || '(제목 없음)'}</h1>`;

    if (data.subtitle) {
      html += `<p class="article-subtitle">${data.subtitle}</p>`;
    }

    html += `<div class="article-body">${data.body || '<p style="color:#999;">본문이 비어있습니다.</p>'}</div>`;

    el.innerHTML = html;
    document.title = (data.title || '미리보기') + ' — 한시나루';
  } catch (e) {
    console.error('Preview parse error:', e);
  }
})();
</script>
</body>
</html>
