<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qwen3-TTS 테스트 스튜디오</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #eee;
    --text2: #aaa;
    --border: #2a2a4a;
    --success: #4caf50;
    --warn: #ff9800;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
  }
  .header .badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .header .status {
    margin-left: auto;
    font-size: 12px;
    color: var(--text2);
  }
  .header .status.ready { color: var(--success); }
  .header .status.loading { color: var(--warn); }

  /* ── 메인 레이아웃 ── */
  .main {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 49px);
  }

  /* ── 좌측: 시 목록 ── */
  .poem-list-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .search-box {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }
  .search-box input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .search-box input:focus { border-color: var(--accent); }
  .poem-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .poem-item {
    padding: 8px 12px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    display: flex;
    gap: 8px;
    align-items: baseline;
  }
  .poem-item:hover { background: var(--bg); }
  .poem-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .poem-item .no {
    font-size: 11px;
    color: var(--text2);
    min-width: 28px;
  }
  .poem-item .title {
    font-size: 13px;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .poem-item .poet {
    font-size: 11px;
    color: var(--text2);
  }

  /* 시 본문 미리보기 */
  .poem-preview {
    border-top: 1px solid var(--border);
    padding: 12px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 15px;
    line-height: 1.8;
    font-family: 'LXGW WenKai Mono TC', 'Noto Serif SC', serif;
    color: var(--text2);
    white-space: pre-line;
  }

  /* ── 우측: 파라미터 + 결과 ── */
  .control-panel {
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 24px;
    gap: 20px;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* 모드 선택 */
  .mode-group {
    display: flex;
    gap: 8px;
  }
  .mode-btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    text-align: center;
    transition: all 0.2s;
  }
  .mode-btn.active {
    border-color: var(--accent);
    background: rgba(233, 69, 96, 0.1);
    color: var(--accent);
    font-weight: 600;
  }

  /* 화자 선택 */
  .speaker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }
  .speaker-card {
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    cursor: pointer;
    transition: all 0.2s;
  }
  .speaker-card.active {
    border-color: var(--accent);
    background: rgba(233, 69, 96, 0.1);
  }
  .speaker-card .name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .speaker-card .desc {
    font-size: 11px;
    color: var(--text2);
  }

  /* Instruct */
  .instruct-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .preset-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .preset-chip {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 12px;
    cursor: pointer;
    background: var(--bg);
    color: var(--text2);
    transition: all 0.2s;
  }
  .preset-chip.active {
    border-color: var(--accent2);
    background: rgba(83, 52, 131, 0.2);
    color: #c9a0ff;
  }
  textarea.instruct-input {
    width: 100%;
    min-height: 60px;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    resize: vertical;
    font-family: inherit;
    outline: none;
  }
  textarea.instruct-input:focus { border-color: var(--accent); }

  /* 생성 버튼 */
  .generate-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .btn-generate {
    padding: 12px 32px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-generate:hover { background: #d63651; }
  .btn-generate:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .generate-status {
    font-size: 13px;
    color: var(--text2);
  }

  /* 오디오 플레이어 */
  .player-section {
    display: none;
  }
  .player-section.visible { display: block; }
  .audio-player {
    width: 100%;
    margin-top: 8px;
    border-radius: 8px;
    outline: none;
  }
  .player-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text2);
    margin-top: 6px;
  }

  /* 생성 이력 */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 300px;
    overflow-y: auto;
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
  }
  .history-item .idx {
    color: var(--accent);
    font-weight: 700;
    min-width: 20px;
  }
  .history-item .info {
    flex: 1;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-item .time {
    color: var(--text2);
    font-size: 11px;
  }
  .btn-play-history {
    padding: 4px 10px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    font-size: 11px;
  }
  .btn-play-history:hover { background: rgba(233, 69, 96, 0.1); }

  /* 파라미터 그룹 */
  .param-group {
    margin-bottom: 12px;
  }
  .param-group:last-child { margin-bottom: 0; }
  .param-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .param-options {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .param-chip {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    background: var(--bg);
    color: var(--text2);
    transition: all 0.2s;
  }
  .param-chip:hover {
    border-color: #666;
    color: var(--text);
  }
  .param-chip.active {
    border-color: var(--accent);
    background: rgba(233, 69, 96, 0.15);
    color: var(--accent);
    font-weight: 600;
  }

  /* 선택한 시 없음 */
  .no-poem {
    text-align: center;
    padding: 40px;
    color: var(--text2);
    font-size: 14px;
  }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* 로딩 스피너 */
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid var(--text2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>Qwen3-TTS 테스트 스튜디오</h1>
  <span class="badge">당시삼백수</span>
  <span class="status" id="serverStatus">서버 연결 확인 중...</span>
</div>

<div class="main">
  <!-- 좌측: 시 목록 -->
  <div class="poem-list-panel">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="시 검색 (번호, 제목, 시인...)">
    </div>
    <div class="poem-list" id="poemList">
      <div class="no-poem">시 목록 로딩 중...</div>
    </div>
    <div class="poem-preview" id="poemPreview">
      시를 선택하면 본문이 여기에 표시됩니다
    </div>
  </div>

  <!-- 우측: 파라미터 + 결과 -->
  <div class="control-panel">
    <!-- 모드 선택 -->
    <div class="section">
      <div class="section-title">모드</div>
      <div class="mode-group">
        <div class="mode-btn active" data-mode="custom_voice" onclick="selectMode('custom_voice')">
          <strong>CustomVoice</strong><br>
          <small>화자 선택 + 스타일 지시</small>
        </div>
        <div class="mode-btn" data-mode="voice_design" onclick="selectMode('voice_design')">
          <strong>VoiceDesign</strong><br>
          <small>자유 음성 설계</small>
        </div>
      </div>
    </div>

    <!-- 화자 선택 -->
    <div class="section" id="speakerSection">
      <div class="section-title">화자 선택 (CustomVoice)</div>
      <div class="speaker-grid" id="speakerGrid"></div>
    </div>

    <!-- 세부 파라미터 -->
    <div class="section">
      <div class="section-title">낭송 스타일 조절</div>

      <!-- 속도 -->
      <div class="param-group">
        <label class="param-label">속도</label>
        <div class="param-options" data-param="speed">
          <button class="param-chip" data-value="极其缓慢">매우 느림</button>
          <button class="param-chip" data-value="缓慢">느림</button>
          <button class="param-chip active" data-value="适中">보통</button>
          <button class="param-chip" data-value="稍快">빠름</button>
          <button class="param-chip" data-value="快速">매우 빠름</button>
        </div>
      </div>

      <!-- 감정/분위기 -->
      <div class="param-group">
        <label class="param-label">감정</label>
        <div class="param-options" data-param="emotion">
          <button class="param-chip active" data-value="庄重肃穆">장중</button>
          <button class="param-chip" data-value="平和淡然">담담</button>
          <button class="param-chip" data-value="深沉悲伤">슬픔</button>
          <button class="param-chip" data-value="轻快喜悦">기쁨</button>
          <button class="param-chip" data-value="豪放激昂">호방</button>
          <button class="param-chip" data-value="温柔细腻">부드러움</button>
        </div>
      </div>

      <!-- 음색 -->
      <div class="param-group">
        <label class="param-label">음색</label>
        <div class="param-options" data-param="tone">
          <button class="param-chip active" data-value="低沉浑厚">저음/웅장</button>
          <button class="param-chip" data-value="清晰明亮">맑은/밝은</button>
          <button class="param-chip" data-value="温暖柔和">따뜻한</button>
          <button class="param-chip" data-value="沙哑磁性">허스키</button>
        </div>
      </div>

      <!-- 호흡/끊어읽기 -->
      <div class="param-group">
        <label class="param-label">끊어읽기</label>
        <div class="param-options" data-param="pause">
          <button class="param-chip" data-value="一气呵成，几乎不停顿">거의 안 끊음</button>
          <button class="param-chip active" data-value="在逗号和句号处自然停顿">자연스럽게</button>
          <button class="param-chip" data-value="每句之间有明显停顿，带有呼吸感">길게 끊음</button>
          <button class="param-chip" data-value="每个字都清晰饱满，字与字之间有明显停顿">자(字) 단위</button>
        </div>
      </div>

      <!-- 스타일 프리셋 (빠른 선택) -->
      <div class="param-group">
        <label class="param-label">프리셋 (한번에 설정)</label>
        <div class="preset-row" id="presetRow"></div>
      </div>

      <!-- instruct 결과 (자동 생성 + 직접 편집 가능) -->
      <div class="param-group">
        <label class="param-label">Instruct 텍스트 <small style="color:var(--text2)">(위 선택이 자동 반영됨, 직접 수정도 가능)</small></label>
        <textarea class="instruct-input" id="instructInput"
          placeholder="위 옵션을 선택하면 자동 생성됩니다"></textarea>
      </div>
    </div>

    <!-- 생성 -->
    <div class="section">
      <div class="generate-row">
        <button class="btn-generate" id="btnGenerate" onclick="generate()" disabled>
          생성하기
        </button>
        <span class="generate-status" id="generateStatus"></span>
      </div>

      <!-- 플레이어 -->
      <div class="player-section" id="playerSection">
        <audio class="audio-player" id="audioPlayer" controls></audio>
        <div class="player-meta" id="playerMeta"></div>
      </div>
    </div>

    <!-- 생성 이력 -->
    <div class="section">
      <div class="section-title">생성 이력</div>
      <div class="history-list" id="historyList">
        <div style="color: var(--text2); font-size: 13px;">아직 생성된 오디오가 없습니다</div>
      </div>
    </div>
  </div>
</div>

<script>
// ── 기본 데이터 (서버 없이도 UI 표시) ──
const DEFAULT_SPEAKERS = [
  {id: "Vivian", name: "Vivian", desc: "밝고 예리한 젊은 여성", lang: "zh"},
  {id: "Serena", name: "Serena", desc: "따뜻하고 부드러운 젊은 여성", lang: "zh"},
  {id: "Uncle_Fu", name: "Uncle_Fu", desc: "나이든 남성, 낮고 부드러운", lang: "zh"},
  {id: "Dylan", name: "Dylan", desc: "북경 청년, 맑고 자연스러운", lang: "zh"},
  {id: "Eric", name: "Eric", desc: "성도 남성, 밝고 허스키한", lang: "zh"},
];

const DEFAULT_PRESETS = [
  {id: "majestic", label: "웅장 낭송", text: "庄重缓慢地朗诵，低沉浑厚的声音，带有古典诗歌的韵律感，在逗号和句号处自然停顿"},
  {id: "calm", label: "담백 낭송", text: "平和淡然地朗诵，语速适中，声音清晰自然，不带过多感情色彩"},
  {id: "sad", label: "슬픈 감성", text: "深沉悲伤地朗诵，声音低沉缓慢，带有叹息和怀念之感"},
  {id: "bright", label: "경쾌한", text: "轻快明亮地朗诵，声音清脆，语速稍快，充满活力和喜悦"},
  {id: "slow", label: "매우 느린 낭송", text: "极其缓慢地朗诵，每个字都清晰饱满，字与字之间有明显停顿，适合初学者跟读"},
];

// ── 전역 상태 ──
let allPoems = [];
let selectedPoem = null;
let currentMode = "custom_voice";
let currentSpeaker = "Uncle_Fu";
let speakers = DEFAULT_SPEAKERS;
let presets = DEFAULT_PRESETS;
let history = [];
let historyCounter = 0;
let serverConnected = false;

// ── 초기화 ──
async function init() {
  // 서버 없이도 화자/프리셋/instruct는 바로 표시
  renderSpeakers();
  renderPresets();
  buildInstruct();

  try {
    const [poemsRes, speakersRes, presetsRes] = await Promise.all([
      fetch("/api/poems"),
      fetch("/api/speakers"),
      fetch("/api/presets"),
    ]);
    allPoems = await poemsRes.json();
    speakers = await speakersRes.json();
    presets = await presetsRes.json();

    renderPoemList(allPoems);
    renderSpeakers();
    renderPresets();

    serverConnected = true;
    document.getElementById("serverStatus").textContent = "서버 연결됨";
    document.getElementById("serverStatus").className = "status ready";
  } catch (e) {
    document.getElementById("serverStatus").textContent = "서버 미연결 — 생성은 server.py 실행 후 가능";
    document.getElementById("serverStatus").className = "status";
    document.getElementById("poemList").innerHTML =
      '<div class="no-poem">서버에 연결되면 시 목록이 표시됩니다.<br><br><small>python tools/tts-studio/server.py</small></div>';
  }
}

// ── 시 목록 렌더링 ──
function renderPoemList(poems) {
  const container = document.getElementById("poemList");
  if (!poems.length) {
    container.innerHTML = '<div class="no-poem">검색 결과 없음</div>';
    return;
  }
  container.innerHTML = poems
    .map(
      (p) => `
    <div class="poem-item" data-no="${esc(p.poemNoStr)}" onclick="selectPoem('${esc(p.poemNoStr)}')">
      <span class="no">${esc(p.poemNoStr)}</span>
      <span class="title">${esc(p.titleZh)}</span>
      <span class="poet">${esc(p.poetZh)}</span>
    </div>`
    )
    .join("");
}

// ── 검색 ──
document.getElementById("searchInput").addEventListener("input", (e) => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) {
    renderPoemList(allPoems);
    return;
  }
  const filtered = allPoems.filter(
    (p) =>
      p.poemNoStr.includes(q) ||
      (p.titleZh || "").toLowerCase().includes(q) ||
      (p.titleKo || "").toLowerCase().includes(q) ||
      (p.poetZh || "").toLowerCase().includes(q) ||
      (p.poetKo || "").toLowerCase().includes(q)
  );
  renderPoemList(filtered);
});

// ── 시 선택 ──
function selectPoem(noStr) {
  selectedPoem = allPoems.find((p) => p.poemNoStr === noStr);
  if (!selectedPoem) return;

  // 활성 표시
  document.querySelectorAll(".poem-item").forEach((el) => {
    el.classList.toggle("active", el.dataset.no === noStr);
  });

  // 미리보기
  document.getElementById("poemPreview").textContent = selectedPoem.textForTTS;

  // 생성 버튼 활성화
  document.getElementById("btnGenerate").disabled = false;
}

// ── 모드 선택 ──
function selectMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-btn").forEach((el) => {
    el.classList.toggle("active", el.dataset.mode === mode);
  });
  // CustomVoice일 때만 화자 패널 표시
  document.getElementById("speakerSection").style.display =
    mode === "custom_voice" ? "block" : "none";
}

// ── 화자 렌더링 ──
function renderSpeakers() {
  const grid = document.getElementById("speakerGrid");
  grid.innerHTML = speakers
    .map(
      (s) => `
    <div class="speaker-card ${s.id === currentSpeaker ? "active" : ""}"
         data-id="${esc(s.id)}" onclick="selectSpeaker('${esc(s.id)}')">
      <div class="name">${esc(s.name)}</div>
      <div class="desc">${esc(s.desc)}</div>
    </div>`
    )
    .join("");
}

function selectSpeaker(id) {
  currentSpeaker = id;
  document.querySelectorAll(".speaker-card").forEach((el) => {
    el.classList.toggle("active", el.dataset.id === id);
  });
}

// ── 파라미터 칩 선택 (속도/감정/음색/끊어읽기) ──
const paramState = {
  speed: "适中",
  emotion: "庄重肃穆",
  tone: "低沉浑厚",
  pause: "在逗号和句号处自然停顿",
};

document.querySelectorAll(".param-options").forEach((group) => {
  group.addEventListener("click", (e) => {
    const chip = e.target.closest(".param-chip");
    if (!chip) return;
    const param = group.dataset.param;
    const value = chip.dataset.value;

    // 같은 그룹 내 active 토글
    group.querySelectorAll(".param-chip").forEach((c) => c.classList.remove("active"));
    chip.classList.add("active");

    paramState[param] = value;
    buildInstruct();

    // 프리셋 선택 해제 (개별 파라미터를 바꿨으니)
    document.querySelectorAll("#presetRow .preset-chip").forEach((c) => c.classList.remove("active"));
  });
});

function buildInstruct() {
  const parts = [];
  // 속도
  if (paramState.speed !== "适中") parts.push(paramState.speed + "地");
  // 감정
  parts.push(paramState.emotion + "地朗诵");
  // 음색
  parts.push(paramState.tone + "的声音");
  // 끊어읽기
  parts.push(paramState.pause);
  // 한시 공통
  parts.push("带有古典诗歌的韵律感");

  document.getElementById("instructInput").value = parts.join("，");
}

// ── 프리셋 렌더링 (빠른 전체 설정) ──
function renderPresets() {
  const row = document.getElementById("presetRow");
  row.innerHTML = presets
    .map(
      (p) => `
    <span class="preset-chip" data-id="${esc(p.id)}" onclick="selectPreset('${esc(p.id)}')">
      ${esc(p.label)}
    </span>`
    )
    .join("");
}

function selectPreset(id) {
  const preset = presets.find((p) => p.id === id);
  if (!preset) return;
  document.getElementById("instructInput").value = preset.text;
  document.querySelectorAll("#presetRow .preset-chip").forEach((el) => {
    el.classList.toggle("active", el.dataset.id === id);
  });
  // 개별 파라미터 칩 선택 해제 (프리셋이 덮어쓰니까)
  document.querySelectorAll(".param-options .param-chip").forEach((c) => c.classList.remove("active"));
}

// ── 생성 ──
async function generate() {
  if (!selectedPoem) return;

  const btn = document.getElementById("btnGenerate");
  const status = document.getElementById("generateStatus");
  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span>TTS 생성 중... (첫 실행 시 모델 로딩으로 1-2분 소요)';

  const body = {
    text: selectedPoem.textForTTS,
    mode: currentMode,
    speaker: currentSpeaker,
    instruct: document.getElementById("instructInput").value.trim(),
    language: "Chinese",
  };

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || "생성 실패");
    }

    const data = await res.json();

    // 플레이어 표시
    const playerSection = document.getElementById("playerSection");
    const audioPlayer = document.getElementById("audioPlayer");
    const playerMeta = document.getElementById("playerMeta");
    playerSection.classList.add("visible");
    audioPlayer.src = data.url;
    audioPlayer.play();
    playerMeta.textContent =
      `${data.mode} | ${data.speaker || "VoiceDesign"} | ${data.elapsed}초 소요`;

    status.textContent = `생성 완료 (${data.elapsed}초)`;

    // 이력 추가
    historyCounter++;
    history.unshift({
      idx: historyCounter,
      url: data.url,
      poem: selectedPoem.poemNoStr + " " + selectedPoem.titleZh,
      mode: data.mode,
      speaker: data.speaker || "VoiceDesign",
      instruct: body.instruct.slice(0, 30) + (body.instruct.length > 30 ? "..." : ""),
      elapsed: data.elapsed,
    });
    renderHistory();
  } catch (e) {
    status.textContent = "오류: " + e.message;
  } finally {
    btn.disabled = false;
  }
}

// ── 이력 렌더링 ──
function renderHistory() {
  const container = document.getElementById("historyList");
  if (!history.length) {
    container.innerHTML = '<div style="color:var(--text2);font-size:13px">아직 없음</div>';
    return;
  }
  container.innerHTML = history
    .map(
      (h) => `
    <div class="history-item">
      <span class="idx">#${h.idx}</span>
      <span class="info">${esc(h.poem)} — ${esc(h.speaker)} — ${esc(h.instruct)}</span>
      <span class="time">${h.elapsed}s</span>
      <button class="btn-play-history" onclick="playHistory('${esc(h.url)}')">재생</button>
    </div>`
    )
    .join("");
}

function playHistory(url) {
  const player = document.getElementById("audioPlayer");
  const section = document.getElementById("playerSection");
  section.classList.add("visible");
  player.src = url;
  player.play();
}

// ── 유틸 ──
function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ── 시작 ──
init();
</script>
</body>
</html>
