<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한시나루 AI 저작툴</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* =====================================================
       CSS RESET & BASE
    ===================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --c-bg: #0f0f1a;
      --c-panel: #13132a;
      --c-surface: #1a1a2e;
      --c-border: #2d2d4e;
      --c-primary: #6c5ce7;
      --c-primary-light: #a29bfe;
      --c-text: #e0d8c8;
      --c-text-dim: #888;
      --c-text-faint: #555;
      --c-danger: #e17055;
      --c-success: #00b894;
      --c-info: #0984e3;
      --c-warn: #fdcb6e;
      --panel-width: 320px;
      --bar-height: 48px;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* =====================================================
       TOP BAR
    ===================================================== */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--bar-height);
      padding: 0 16px;
      background: var(--c-panel);
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
      z-index: 100;
    }

    .top-bar__title {
      font-family: 'Noto Serif KR', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--c-primary-light);
      letter-spacing: 0.02em;
    }

    .top-bar__actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-bar__actions button {
      height: 32px;
      padding: 0 12px;
      border-radius: 6px;
      border: 1px solid var(--c-border);
      background: var(--c-surface);
      color: var(--c-text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .top-bar__actions button:hover {
      border-color: var(--c-primary);
      color: var(--c-primary-light);
    }

    .top-bar__actions button#btn-settings {
      font-size: 16px;
      padding: 0 10px;
    }

    /* =====================================================
       MAIN LAYOUT
    ===================================================== */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* =====================================================
       INPUT PANEL (Left)
    ===================================================== */
    .input-panel {
      width: var(--panel-width);
      min-width: var(--panel-width);
      background: var(--c-panel);
      border-right: 1px solid var(--c-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .input-panel::-webkit-scrollbar {
      width: 4px;
    }

    .input-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    .input-panel::-webkit-scrollbar-thumb {
      background: var(--c-border);
      border-radius: 2px;
    }

    .input-panel__section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--c-border);
    }

    .input-panel__section:last-child {
      border-bottom: none;
    }

    .input-panel__heading {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--c-text-faint);
      margin-bottom: 10px;
    }

    .input-panel__label {
      display: block;
      font-size: 12px;
      color: var(--c-text-dim);
      margin-bottom: 6px;
      font-weight: 500;
    }

    /* =====================================================
       CHIPS
    ===================================================== */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 4px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--c-border);
      background: var(--c-surface);
      color: var(--c-text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }

    .chip:hover {
      border-color: var(--c-primary);
      color: var(--c-primary-light);
    }

    .chip.active {
      border-color: var(--c-primary);
      background: rgba(108, 92, 231, 0.2);
      color: var(--c-primary-light);
    }

    .chip--add {
      border-style: dashed;
      color: var(--c-text-faint);
    }

    .chip--add:hover {
      border-color: var(--c-primary);
      color: var(--c-primary-light);
    }

    .chip--custom {
      background: rgba(108, 92, 231, 0.1);
      border-color: var(--c-primary);
      color: var(--c-primary-light);
    }

    .chip__remove {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(108, 92, 231, 0.3);
      font-size: 10px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .chip__remove:hover {
      background: var(--c-danger);
    }

    /* =====================================================
       FORM FIELDS
    ===================================================== */
    .field {
      width: 100%;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 6px;
      color: var(--c-text);
      font-family: 'Pretendard', sans-serif;
      font-size: 13px;
      padding: 8px 10px;
      transition: border-color 0.15s ease;
      resize: vertical;
    }

    .field::placeholder {
      color: var(--c-text-faint);
    }

    .field:focus {
      outline: none;
      border-color: var(--c-primary);
    }

    select.field {
      appearance: none;
      cursor: pointer;
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--c-text-faint);
      pointer-events: none;
      font-size: 12px;
    }

    .select-wrap select {
      padding-right: 28px;
    }

    /* =====================================================
       LENGTH CHIPS
    ===================================================== */
    .length-chips {
      display: flex;
      gap: 6px;
    }

    .length-chips .chip {
      flex: 1;
      justify-content: center;
      padding: 5px 8px;
    }

    /* =====================================================
       GENERATE BUTTON
    ===================================================== */
    .btn-generate {
      width: 100%;
      height: 40px;
      background: var(--c-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-generate:hover {
      background: #7d6ff0;
      transform: translateY(-1px);
    }

    .btn-generate:active {
      transform: translateY(0);
    }

    .btn-generate:disabled {
      background: var(--c-border);
      color: var(--c-text-faint);
      cursor: not-allowed;
      transform: none;
    }

    /* =====================================================
       EDITOR PANEL (Right)
    ===================================================== */
    .editor-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--c-bg);
    }

    /* =====================================================
       MODE TABS
    ===================================================== */
    .mode-tabs {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 8px 16px 0;
      background: var(--c-panel);
      border-bottom: 1px solid var(--c-border);
      flex-shrink: 0;
    }

    .mode-tab {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: var(--c-text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      border-radius: 6px 6px 0 0;
    }

    .mode-tab:hover {
      color: var(--c-text);
      background: rgba(255, 255, 255, 0.04);
    }

    .mode-tab.active {
      color: var(--c-primary-light);
      border-bottom-color: var(--c-primary);
      background: rgba(108, 92, 231, 0.08);
    }

    /* =====================================================
       EDITOR BODY
    ===================================================== */
    .editor-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .editor-body::-webkit-scrollbar {
      width: 6px;
    }

    .editor-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .editor-body::-webkit-scrollbar-thumb {
      background: var(--c-border);
      border-radius: 3px;
    }

    .editor-title {
      margin-bottom: 20px;
    }

    .editor-title-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--c-border);
      color: var(--c-text);
      font-family: 'Noto Serif KR', serif;
      font-size: 24px;
      font-weight: 700;
      padding: 8px 0;
      transition: border-color 0.15s ease;
    }

    .editor-title-input::placeholder {
      color: var(--c-text-faint);
    }

    .editor-title-input:focus {
      outline: none;
      border-bottom-color: var(--c-primary);
    }

    /* =====================================================
       SECTION BLOCKS
    ===================================================== */
    .section-block {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-left: 3px solid var(--c-border);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .section-block[data-color="red"]    { border-left-color: #e17055; }
    .section-block[data-color="green"]  { border-left-color: #00b894; }
    .section-block[data-color="blue"]   { border-left-color: #0984e3; }
    .section-block[data-color="yellow"] { border-left-color: #fdcb6e; }
    .section-block[data-color="purple"] { border-left-color: #6c5ce7; }

    .section-block__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--c-border);
    }

    .section-block__label {
      font-size: 12px;
      font-weight: 600;
      color: var(--c-text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .section-block__actions {
      display: flex;
      gap: 6px;
    }

    .section-block__actions button {
      background: transparent;
      border: none;
      color: var(--c-text-faint);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.15s ease;
    }

    .section-block__actions button:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--c-text-dim);
    }

    .section-block__content {
      padding: 12px 14px;
      white-space: pre-wrap;
    }

    .section-block__content [contenteditable] {
      outline: none;
      min-height: 60px;
      color: var(--c-text);
      font-size: 14px;
      line-height: 1.7;
      font-family: 'Pretendard', sans-serif;
    }

    .section-block__content [contenteditable]:empty::before {
      content: attr(data-placeholder);
      color: var(--c-text-faint);
    }

    .btn-add-section {
      width: 100%;
      height: 36px;
      background: transparent;
      border: 1px dashed var(--c-border);
      border-radius: 8px;
      color: var(--c-text-faint);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-add-section:hover {
      border-color: var(--c-primary);
      color: var(--c-primary-light);
    }

    /* =====================================================
       SAVE BAR
    ===================================================== */
    .save-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--bar-height);
      padding: 0 16px;
      background: var(--c-panel);
      border-top: 1px solid var(--c-border);
      flex-shrink: 0;
    }

    .save-bar__meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--c-text-faint);
    }

    .save-bar__meta input,
    .save-bar__meta select {
      height: 28px;
      padding: 0 8px;
      font-size: 12px;
    }

    .save-bar__actions {
      display: flex;
      gap: 8px;
    }

    .btn-save {
      height: 32px;
      padding: 0 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      border: 1px solid transparent;
    }

    .btn-save--draft {
      background: var(--c-surface);
      border-color: var(--c-border);
      color: var(--c-text-dim);
    }

    .btn-save--draft:hover {
      border-color: var(--c-primary);
      color: var(--c-primary-light);
    }

    .btn-save--publish {
      background: var(--c-success);
      color: #fff;
    }

    .btn-save--publish:hover {
      background: #00d2a8;
    }

    /* =====================================================
       FLOATING TOOLBAR
    ===================================================== */
    .floating-toolbar {
      position: absolute;
      display: none;
      align-items: center;
      gap: 2px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 8px;
      padding: 4px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      z-index: 200;
    }

    .floating-toolbar.visible {
      display: flex;
    }

    .floating-toolbar button {
      background: transparent;
      border: none;
      color: var(--c-text-dim);
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .floating-toolbar button:hover {
      background: rgba(108, 92, 231, 0.2);
      color: var(--c-primary-light);
    }

    .floating-toolbar__divider {
      width: 1px;
      height: 16px;
      background: var(--c-border);
      margin: 0 2px;
    }

    /* =====================================================
       AI BUBBLE
    ===================================================== */
    .ai-bubble {
      position: absolute;
      display: none;
      flex-direction: column;
      width: 320px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      z-index: 200;
    }

    .ai-bubble.visible {
      display: flex;
    }

    .ai-bubble__label {
      font-size: 11px;
      font-weight: 600;
      color: var(--c-primary-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .ai-bubble__input {
      width: 100%;
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: 6px;
      color: var(--c-text);
      font-size: 13px;
      font-family: 'Pretendard', sans-serif;
      padding: 8px 10px;
      resize: none;
      min-height: 60px;
    }

    .ai-bubble__input:focus {
      outline: none;
      border-color: var(--c-primary);
    }

    .ai-bubble__actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
    }

    .ai-bubble__actions button {
      height: 28px;
      padding: 0 12px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .ai-bubble__actions .btn-cancel {
      background: transparent;
      border: 1px solid var(--c-border);
      color: var(--c-text-dim);
    }

    .ai-bubble__actions .btn-submit {
      background: var(--c-primary);
      border: none;
      color: #fff;
      font-weight: 600;
    }

    .ai-bubble__actions .btn-submit:hover {
      background: #7d6ff0;
    }

    /* =====================================================
       SLASH PALETTE
    ===================================================== */
    .slash-palette {
      position: absolute;
      display: none;
      flex-direction: column;
      width: 260px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      z-index: 200;
    }

    .slash-palette.visible {
      display: flex;
    }

    .slash-palette__header {
      padding: 8px 12px;
      font-size: 11px;
      color: var(--c-text-faint);
      border-bottom: 1px solid var(--c-border);
    }

    .slash-palette__input-wrap {
      padding: 8px 12px;
      border-bottom: 1px solid var(--c-border);
    }

    .slash-palette__input {
      width: 100%;
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: 5px;
      color: var(--c-text);
      font-size: 13px;
      font-family: 'Pretendard', sans-serif;
      padding: 5px 8px;
    }

    .slash-palette__input:focus {
      outline: none;
      border-color: var(--c-primary);
    }

    .slash-palette__item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.1s ease;
    }

    .slash-palette__item:hover,
    .slash-palette__item.selected {
      background: rgba(108, 92, 231, 0.15);
    }

    .slash-palette__item-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .slash-palette__item-info {
      flex: 1;
    }

    .slash-palette__item-label {
      font-size: 13px;
      color: var(--c-text);
    }

    .slash-palette__item-desc {
      font-size: 11px;
      color: var(--c-text-faint);
    }

    .slash-palette__divider {
      height: 1px;
      background: var(--c-border);
      margin: 4px 0;
    }

    /* =====================================================
       MODAL
    ===================================================== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 500;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      width: 420px;
      max-width: calc(100vw - 40px);
      max-height: 90vh;
      overflow-y: auto;
      background: #252545;
      border: 1px solid #4a4a7a;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(108, 92, 231, 0.3);
    }

    .modal__title {
      font-family: 'Noto Serif KR', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--c-text);
      margin-bottom: 20px;
    }

    .modal__field {
      margin-bottom: 16px;
    }

    .modal__field label {
      display: block;
      font-size: 12px;
      color: var(--c-text-dim);
      margin-bottom: 6px;
      font-weight: 500;
    }

    .modal__actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--c-border);
    }

    .modal__btn-cancel {
      height: 36px;
      padding: 0 16px;
      background: transparent;
      border: 1px solid var(--c-border);
      border-radius: 6px;
      color: var(--c-text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .modal__btn-cancel:hover {
      border-color: var(--c-text-dim);
      color: var(--c-text);
    }

    .modal__btn-ok {
      height: 36px;
      padding: 0 20px;
      background: var(--c-primary);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .modal__btn-ok:hover {
      background: #7d6ff0;
    }

    /* modal-overlay--open: JS로 설정하는 열림 상태 (display:flex는 JS가 직접 설정) */
    .modal-overlay--open {
      display: flex;
    }

    .modal__sep {
      border: none;
      border-top: 1px solid var(--c-border);
      margin: 16px 0;
    }

    .modal__btn-test {
      height: 36px;
      padding: 0 16px;
      background: transparent;
      border: 1px solid var(--c-border);
      border-radius: 6px;
      color: var(--c-text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-right: auto;
    }

    .modal__btn-test:hover {
      border-color: var(--c-info);
      color: var(--c-info);
    }

    /* =====================================================
       STREAMING INDICATOR
    ===================================================== */
    .streaming-indicator {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--c-text-faint);
    }

    .streaming-indicator.visible {
      display: flex;
    }

    .streaming-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--c-primary-light);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .streaming-dot:nth-child(2) { animation-delay: 0.2s; }
    .streaming-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* =====================================================
       TOAST
    ===================================================== */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-left: 3px solid var(--c-primary);
      border-radius: 8px;
      font-size: 13px;
      color: var(--c-text);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      z-index: 1000;
      max-width: 320px;
      animation: slideIn 0.2s ease;
    }

    .toast.visible {
      display: flex;
    }

    .toast--success {
      border-left-color: var(--c-success);
    }

    .toast--error {
      border-left-color: var(--c-danger);
    }

    .toast--warn {
      border-left-color: var(--c-warn);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* =====================================================
       UTILITY
    ===================================================== */
    .hidden {
      display: none !important;
    }

    .mt-8  { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }

    /* =====================================================
       AUTH — login button + status in top bar
    ===================================================== */
    .auth-status {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .auth-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(0, 184, 148, 0.15);
      border: 1px solid var(--c-success);
      color: var(--c-success);
    }

    .auth-badge--anon {
      background: rgba(85, 85, 85, 0.15);
      border-color: var(--c-text-faint);
      color: var(--c-text-faint);
    }

    .btn-auth {
      height: 32px;
      padding: 0 12px;
      border-radius: 6px;
      border: 1px solid var(--c-border);
      background: var(--c-surface);
      color: var(--c-text-dim);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-auth:hover {
      border-color: var(--c-primary);
      color: var(--c-primary-light);
    }

    .btn-auth--logout:hover {
      border-color: var(--c-danger);
      color: var(--c-danger);
    }

    /* =====================================================
       LOGIN MODAL
    ===================================================== */
    .login-modal {
      width: 360px;
    }

    .login-modal__desc {
      font-size: 12px;
      color: var(--c-text-faint);
      margin-bottom: 16px;
    }

    /* =====================================================
       SITE TREE
    ===================================================== */
    .tree-container {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .tree-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .tree-header__label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--c-text-faint);
    }

    .tree-refresh-btn {
      background: transparent;
      border: none;
      color: var(--c-text-faint);
      font-size: 12px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.15s ease;
    }

    .tree-refresh-btn:hover {
      color: var(--c-primary-light);
      background: rgba(108, 92, 231, 0.1);
    }

    #site-tree {
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: 6px;
      overflow: hidden;
      max-height: 200px;
      overflow-y: auto;
    }

    #site-tree::-webkit-scrollbar {
      width: 3px;
    }

    #site-tree::-webkit-scrollbar-thumb {
      background: var(--c-border);
      border-radius: 2px;
    }

    .tree-node {
      display: block;
    }

    .tree-node__row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      cursor: pointer;
      transition: background 0.1s ease;
      font-size: 12px;
      color: var(--c-text-dim);
      border-radius: 0;
    }

    .tree-node__row:hover {
      background: rgba(108, 92, 231, 0.1);
      color: var(--c-text);
    }

    .tree-node__row.selected {
      background: rgba(108, 92, 231, 0.2);
      color: var(--c-primary-light);
    }

    .tree-toggle {
      font-size: 10px;
      width: 10px;
      flex-shrink: 0;
      color: var(--c-text-faint);
      transition: transform 0.15s ease;
    }

    .tree-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-children {
      /* shown/hidden by JS */
    }

    .tree-empty,
    .tree-error,
    .tree-articles-msg {
      padding: 10px 12px;
      font-size: 12px;
      color: var(--c-text-faint);
    }

    .tree-error {
      color: var(--c-danger);
    }

    /* Selected location display */
    .tree-selected-info {
      margin-top: 6px;
      padding: 5px 8px;
      background: rgba(108, 92, 231, 0.1);
      border: 1px solid rgba(108, 92, 231, 0.3);
      border-radius: 5px;
      font-size: 11px;
      color: var(--c-primary-light);
      display: none;
    }

    .tree-selected-info.visible {
      display: block;
    }

    /* Articles sub-panel */
    #tree-articles-panel {
      margin-top: 8px;
      border: 1px solid var(--c-border);
      border-radius: 6px;
      overflow: hidden;
    }

    .tree-articles-header {
      padding: 5px 10px;
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      font-size: 11px;
      font-weight: 600;
      color: var(--c-text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #tree-articles-list {
      max-height: 150px;
      overflow-y: auto;
      background: var(--c-bg);
    }

    #tree-articles-list::-webkit-scrollbar {
      width: 3px;
    }

    #tree-articles-list::-webkit-scrollbar-thumb {
      background: var(--c-border);
      border-radius: 2px;
    }

    .tree-article-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      cursor: pointer;
      border-bottom: 1px solid rgba(45, 45, 78, 0.5);
      transition: background 0.1s ease;
    }

    .tree-article-item:last-child {
      border-bottom: none;
    }

    .tree-article-item:hover {
      background: rgba(108, 92, 231, 0.1);
    }

    .tree-article-status {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .tree-article-status--published {
      background: var(--c-success);
    }

    .tree-article-status--draft {
      background: var(--c-text-faint);
    }

    .tree-article-title {
      flex: 1;
      font-size: 12px;
      color: var(--c-text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tree-article-date {
      font-size: 10px;
      color: var(--c-text-faint);
      flex-shrink: 0;
    }

    /* Tree not loaded hint */
    .tree-hint {
      padding: 10px 12px;
      font-size: 11px;
      color: var(--c-text-faint);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- ===================================================
       TOP BAR
  =================================================== -->
  <header class="top-bar">
    <div class="top-bar__title">한시나루 AI 저작툴</div>
    <div class="top-bar__actions">
      <div class="auth-status" id="auth-status">
        <span class="auth-badge auth-badge--anon" id="auth-badge">비로그인</span>
        <button class="btn-auth" id="btn-login">로그인</button>
      </div>
      <button id="btn-load">불러오기</button>
      <button id="btn-reset">초기화</button>
      <button id="btn-settings">⚙</button>
    </div>
  </header>

  <!-- ===================================================
       MAIN LAYOUT
  =================================================== -->
  <div class="main">

    <!-- Left: Input Panel -->
    <div class="input-panel" id="input-panel">
      <!-- Rendered by App.renderInputPanel() -->
      <div class="input-panel__section" style="display:flex; align-items:center; justify-content:center; color: var(--c-text-faint); font-size:13px; padding: 40px 16px;">
        초기화 중...
      </div>
    </div>

    <!-- Right: Editor Panel -->
    <div class="editor-panel">

      <!-- Mode Tabs -->
      <div class="mode-tabs" id="mode-tabs">
        <!-- Rendered by App.renderModeTabs() -->
      </div>

      <!-- Editor Body -->
      <div class="editor-body" id="editor-body">
        <!-- Rendered by Editor.init() -->
      </div>

    </div>
  </div>

  <!-- ===================================================
       SAVE BAR
  =================================================== -->
  <footer class="save-bar">
    <div class="save-bar__meta" id="save-meta">
      <!-- Rendered by App.updateSaveMeta() -->
      <span style="color: var(--c-text-faint); font-size:12px;">모드를 선택하세요</span>
    </div>
    <div class="save-bar__actions">
      <button class="btn-save btn-save--draft" id="btn-save-draft">Draft 저장</button>
      <button class="btn-save btn-save--publish" id="btn-save-publish">Published 저장</button>
    </div>
  </footer>

  <!-- ===================================================
       FLOATING TOOLBAR
  =================================================== -->
  <div class="floating-toolbar" id="floating-toolbar">
    <!-- Rendered by Toolbar.init() -->
  </div>

  <!-- ===================================================
       AI BUBBLE
  =================================================== -->
  <div class="ai-bubble" id="ai-bubble">
    <div class="ai-bubble__label">✨ AI 어시스턴트</div>
    <textarea class="ai-bubble__input" id="ai-bubble-input" placeholder="어떻게 수정할까요?..." rows="3"></textarea>
    <div class="ai-bubble__actions">
      <button class="btn-cancel" id="ai-bubble-cancel">취소</button>
      <button class="btn-submit" id="ai-bubble-submit">적용</button>
    </div>
  </div>

  <!-- ===================================================
       SLASH PALETTE
  =================================================== -->
  <div class="slash-palette" id="slash-palette">
    <div class="slash-palette__header">명령어 선택</div>
    <div class="slash-palette__input-wrap">
      <input class="slash-palette__input" id="slash-palette-input" placeholder="검색..." />
    </div>
    <!-- Items rendered by Toolbar.js -->
  </div>

  <!-- ===================================================
       LOGIN MODAL
  =================================================== -->
  <div class="modal-overlay" id="login-modal">
    <div class="modal login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
      <h2 class="modal__title" id="login-modal-title">관리자 로그인</h2>
      <p class="login-modal__desc">Supabase 계정으로 로그인하면 아티클을 저장할 수 있습니다.</p>

      <div class="field modal__field">
        <label for="login-email">이메일</label>
        <input id="login-email" type="email" class="field" placeholder="admin@example.com" autocomplete="email" />
      </div>

      <div class="field modal__field">
        <label for="login-password">비밀번호</label>
        <input id="login-password" type="password" class="field" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <div class="modal__actions">
        <button class="modal__btn-cancel" id="login-modal-cancel" type="button">취소</button>
        <button class="modal__btn-ok" id="login-modal-submit" type="button">로그인</button>
      </div>
    </div>
  </div>

  <!-- ===================================================
       SETTINGS MODAL
       내부 HTML은 Settings.showModal()이 완전히 교체합니다.
  =================================================== -->
  <div class="modal-overlay" id="settings-modal"></div>

  <!-- ===================================================
       STREAMING INDICATOR
  =================================================== -->
  <div class="streaming-indicator" id="streaming-indicator">
    <div class="streaming-dot"></div>
    <div class="streaming-dot"></div>
    <div class="streaming-dot"></div>
    <span>AI 생성 중...</span>
  </div>

  <!-- ===================================================
       TOAST
  =================================================== -->
  <div class="toast" id="toast">
    <span id="toast-message"></span>
  </div>

  <!-- ===================================================
       SCRIPTS (load order matters)
  =================================================== -->
  <script src="js/settings.js"></script>
  <script src="js/api.js"></script>
  <script src="js/prompt.js"></script>
  <script src="js/db.js"></script>
  <script src="js/tree.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/toolbar.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
