<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <base href="../">
  <title>한시나루</title>


  <link rel="stylesheet" href="/shared/styles.css">
  <link rel="stylesheet" href="styles.css" />

  <!-- 지도: Leaflet (출생지 표시용) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- 관계도: vis-network (시인 교유 관계 표시용) -->
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body style="padding-top: 60px;">

<!-- embed 모드: iframe으로 삽입될 때 네비/푸터 제거 -->
<script>
(function() {
  if (new URLSearchParams(location.search).get('embed') === 'true') {
    document.body.style.paddingTop = '0';
    document.body.classList.add('embed-mode');
  }
})();
</script>

<div id="nav-placeholder"></div>

<main class="timeline" id="timeline"></main>

<!-- 공용 모달(시인/작품/사건 모두 이 틀을 사용) -->
<div id="modal-overlay" class="modal-overlay" hidden>
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close" aria-label="닫기">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="/shared/supabase.js"></script>
<script src="app.js"></script>

<div id="footer-placeholder"></div>
<script>
// embed 모드: nav/footer placeholder 제거 → components.js가 주입할 대상 없앰
if (document.body.classList.contains('embed-mode')) {
  var np = document.getElementById('nav-placeholder');
  var fp = document.getElementById('footer-placeholder');
  if (np) np.remove();
  if (fp) fp.remove();
}
</script>
<script src="/shared/auth-state.js"></script>
  <script src="/shared/components.js"></script>

</body>
</html>
