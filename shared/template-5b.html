<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout 5-b 템플릿 — 한시의모든것</title>

  <!-- 웹폰트: Adobe Fonts -->
  <link rel="stylesheet" href="https://use.typekit.net/dje5vco.css">
  <!-- 웹폰트: Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+Mono+TC&family=Noto+Serif+KR:wght@200..900&family=Noto+Serif+TC:wght@200..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/shared/styles.css">
  <style>
    /* ===== 5-b 템플릿 전용 보완 스타일 ===== */
    body {
      overflow: hidden; /* 페이지 자체 스크롤 방지: iframe이 내부 스크롤 */
    }

    /* 콘텐츠 영역: 탭바 아래 전체 높이 */
    .content-5b {
      height: calc(100vh - 112px); /* nav(60px) + tab-bar(52px) */
      overflow: hidden;
    }

    .content-5b iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 비활성 탭 커서 */
    .era-tab:not(.active)::after {
      content: ' (준비 중)';
      font-size: 11px;
      opacity: 0.6;
    }

    /* 비활성 콘텐츠 플레이스홀더 */
    .content-5b-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #999;
      text-align: center;
      padding: 32px;
    }
    .content-5b-placeholder .placeholder-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .content-5b-placeholder h2 {
      font-size: 20px;
      color: #555;
      margin-bottom: 8px;
    }
    .content-5b-placeholder p {
      font-size: 14px;
      line-height: 1.8;
      max-width: 400px;
    }
  </style>
</head>
<body>

  <div id="nav-placeholder"></div>

  <!-- ===== Layout 5-b: 상단 시대 탭바 ===== -->
  <div class="era-tab-bar" id="eraTabBar">
    <span class="era-tab" data-era="chunqiu">춘추전국</span>
    <span class="era-tab" data-era="han">한</span>
    <span class="era-tab" data-era="weijin">위진남북조</span>
    <span class="era-tab active" data-era="tang">당</span>
    <span class="era-tab" data-era="wudai">오대십국</span>
    <span class="era-tab" data-era="song">송</span>
    <span class="era-tab" data-era="yuan">원</span>
    <span class="era-tab" data-era="ming">명</span>
    <span class="era-tab" data-era="qing">청</span>
  </div>

  <!-- ===== 콘텐츠 영역 ===== -->
  <div class="content-5b" id="content5b">
    <!-- 당: 기존 타임라인 iframe -->
    <iframe id="timelineFrame" src="/timeline/" title="당나라 타임라인"></iframe>
  </div>

  <!-- 푸터 없음: 풀스크린 레이아웃 -->

  <script src="/shared/components.js"></script>

  <script>
  // ===== Layout 5-b: 탭바 인터랙션 =====
  (function () {
    'use strict';

    const tabBar = document.getElementById('eraTabBar');
    const content = document.getElementById('content5b');
    if (!tabBar || !content) return;

    // 활성 시대 목록 (콘텐츠가 있는 시대만)
    const activeEras = new Set(['tang']);

    tabBar.addEventListener('click', function (e) {
      const tab = e.target.closest('.era-tab');
      if (!tab) return;

      const era = tab.dataset.era;

      // 비활성 시대 클릭 시 무시
      if (!activeEras.has(era)) return;

      // 이미 활성인 탭 클릭 시 무시
      if (tab.classList.contains('active')) return;

      // 탭 전환
      tabBar.querySelectorAll('.era-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');

      // 콘텐츠 전환
      switchContent(era);
    });

    function switchContent(era) {
      if (era === 'tang') {
        content.innerHTML = '<iframe id="timelineFrame" src="/timeline/" title="당나라 타임라인"></iframe>';
      } else {
        content.innerHTML = `
          <div class="content-5b-placeholder">
            <div class="placeholder-icon">&#128218;</div>
            <h2>${getEraName(era)} 시대</h2>
            <p>이 시대의 콘텐츠를 준비 중입니다.<br>현재는 당나라 타임라인만 이용 가능합니다.</p>
          </div>`;
      }
    }

    function getEraName(era) {
      const names = {
        chunqiu: '춘추전국',
        han: '한',
        weijin: '위진남북조',
        tang: '당',
        wudai: '오대십국',
        song: '송',
        yuan: '원',
        ming: '명',
        qing: '청'
      };
      return names[era] || era;
    }

  })();
  </script>

</body>
</html>
