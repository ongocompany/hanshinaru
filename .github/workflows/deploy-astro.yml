name: Deploy Astro to jinas

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npx astro build

      - name: Copy admin to dist
        run: cp -r admin dist/admin

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 -p ${{ secrets.DEPLOY_PORT }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via tar+ssh
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=yes"
          REMOTE="${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}"
          DEPLOY_PATH="/var/www/hanshinaru.kr"
          # Clean remote directory and extract new build
          tar -czf - -C dist . | $SSH_CMD $REMOTE "rm -rf ${DEPLOY_PATH}/* && tar -xzf - -C ${DEPLOY_PATH} && chmod -R 755 ${DEPLOY_PATH}"
